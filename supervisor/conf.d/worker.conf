[program:worker]
command=/app/code/scripts/worker-wrapper.sh
user=root
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=AGENT_BIN="%(ENV_AGENT_BIN)s",CONFIG_PATH="/app/data/config.json"
